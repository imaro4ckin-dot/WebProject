<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Budget Escapes | Destinations</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans flex flex-col min-h-screen m-0">

    <header role="banner" class="bg-blue-800 text-white p-4 md:px-8 flex justify-between items-center">
        <div class="text-2xl font-bold">Budget Escapes</div>
        <nav role="navigation" aria-label="Main Navigation">
            <ul class="nav-links hidden md:flex gap-6 m-0 p-0 list-none">
                <li><a href="index.html" class="hover:text-red-300 transition-colors">Home</a></li>
                <li><a href="destinations.html" aria-current="page" class="text-red-400 font-bold underline">Destinations</a></li>
                <li><a href="book.html" class="hover:text-red-300 transition-colors">Book a Trip</a></li>
                <li><a href="about.html" class="hover:text-red-300 transition-colors">About Us</a></li>
                <li><a href="contact.html" class="hover:text-red-300 transition-colors">Contact</a></li>
            </ul>
            <button class="menu-toggle md:hidden text-white text-2xl" aria-label="Toggle navigation" aria-expanded="false">☰</button>
        </nav>
    </header>

    <main role="main" class="flex-grow">
        <section class="text-center py-10 px-4">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">Our Travel Blog</h1>
            <p class="text-gray-600">Filter by category to find your next adventure.</p>
        </section>

        <section class="flex justify-center gap-4 mb-8 px-4 flex-wrap" aria-label="Destination Filters">
            <button class="filter-btn bg-blue-800 text-white border-2 border-blue-800 px-6 py-2 rounded font-bold" data-filter="all" aria-pressed="true">All Trips</button>
            <button class="filter-btn bg-white text-blue-800 border-2 border-blue-800 px-6 py-2 rounded font-bold hover:bg-blue-100 transition-colors" data-filter="nature" aria-pressed="false">Nature</button>
            <button class="filter-btn bg-white text-blue-800 border-2 border-blue-800 px-6 py-2 rounded font-bold hover:bg-blue-100 transition-colors" data-filter="city" aria-pressed="false">City</button>
        </section>

        <section class="px-6 pb-12 max-w-6xl mx-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="gallery-item bg-white p-4 rounded shadow border border-gray-200 text-center" data-category="nature">
                    <img src="Media/Heiligenberg_Heidelberg.jpeg" alt="Scenic mountain hike in Heidelberg" class="lightbox-trigger w-full h-48 object-cover rounded cursor-pointer mb-3 hover:opacity-80 transition-opacity" tabindex="0" role="button" aria-label="Enlarge Mountain hike image">
                    <h3 class="text-xl font-bold text-blue-900">Mountain Hike</h3>
                </div>

                <div class="gallery-item bg-white p-4 rounded shadow border border-gray-200 text-center" data-category="city">
                    <img src="Media/cafes-heidelberg-cafe-knoesel.jpg" alt="Vintage Cafe Knoesel in Heidelberg" class="lightbox-trigger w-full h-48 object-cover rounded cursor-pointer mb-3 hover:opacity-80 transition-opacity" tabindex="0" role="button" aria-label="Enlarge Vintage City Cafe image">
                    <h3 class="text-xl font-bold text-blue-900">Vintage City Cafe</h3>
                </div>

                <div class="gallery-item bg-white p-4 rounded shadow border border-gray-200 text-center" data-category="nature">
                    <img src="Media/konstanz.jpg" alt="Hidden lake in Konstanz" class="lightbox-trigger w-full h-48 object-cover rounded cursor-pointer mb-3 hover:opacity-80 transition-opacity" tabindex="0" role="button" aria-label="Enlarge Hidden Lake image">
                    <h3 class="text-xl font-bold text-blue-900">Hidden Lake</h3>
                </div>

            </div>
        </section>

        <section class="bg-gray-200 py-10 px-6 text-center border-t border-gray-300">
            <h2 class="text-2xl font-bold text-blue-900 mb-6">Explore the Map</h2>
            <div class="max-w-4xl mx-auto rounded overflow-hidden shadow">
                <iframe src="https://maps.google.com/maps?q=Heidelberg&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy" title="Interactive map of Heidelberg, Germany"></iframe>
            </div>
        </section>
    </main>

    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image gallery lightbox" class="hidden fixed inset-0 bg-black bg-opacity-90 z-50 justify-center items-center">
        <button class="close-lightbox absolute top-4 right-6 text-white text-5xl font-bold cursor-pointer bg-transparent border-0" aria-label="Close lightbox">×</button>
        <img id="lightbox-img" class="max-w-[90%] max-h-[80%] rounded shadow-lg" src="" alt="Enlarged image">
    </div>

    <footer role="contentinfo" class="bg-blue-900 text-white text-center p-6 mt-auto">
        <p>© 2026 Student Budget Escapes. Designed by Ivan, Mariana, Rodrigo.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
